<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سحب جمعية سنن | أعلام السنة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* ⚠️ استبدل مسارات الخطوط بمساراتك الفعلية ⚠️ */
        @font-face {
            font-family: 'CustomFont';
            src: url('fonts/TheYearofHandicrafts-Regular.otf') format('opentype');
            font-weight: 400;
        }
        @font-face {
            font-family: 'CustomFont';
            src: url('fonts/TheYearofHandicrafts-Bold.otf') format('opentype');
            font-weight: 700;
        }
        @font-face {
            font-family: 'CustomFont';
            src: url('fonts/TheYearofHandicrafts-Black.otf') format('opentype');
            font-weight: 900;
        }

        body { font-family: 'CustomFont', 'Tajawal', sans-serif; background-color: #F3EFE9; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #7D7168; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #2A3F46; }

        @keyframes shake {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(-8px, 5px) rotate(-3deg); }
            50% { transform: translate(8px, -5px) rotate(3deg); }
            75% { transform: translate(-5px, -8px) rotate(-1deg); }
        }
        .animate-shake { animation: shake 0.2s infinite; }

        .scale-in { animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes scaleIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .sponsor-img { transition: all 0.3s ease; filter: grayscale(100%); opacity: 0.7; }
        .sponsor-img:hover { filter: grayscale(0%); opacity: 1; transform: scale(1.05); }
    </style>
</head>
<body class="flex flex-col h-screen w-full overflow-hidden">

    <!-- الهيدر (متجاوب: يصغر في الجوال ويكبر في الكمبيوتر) -->
    <header class="flex-none bg-white border-b border-[#7D7168]/20 px-4 lg:px-8 py-3 lg:py-4 flex justify-between items-center shadow-md z-50">
        <img src="images/logo-sunnan.png" class="h-12 md:h-16 lg:h-24 w-auto object-contain" alt="شعار جمعية سنن">
        <div class="text-center px-2">
            <h1 class="text-lg md:text-2xl lg:text-4xl font-black text-[#2A3F46] leading-tight">مسابقة أعلام السنة</h1>
            <div class="h-1 lg:h-1.5 w-16 lg:w-32 bg-[#C5B358] mx-auto rounded-full mt-1 lg:mt-2"></div>
            <p class="text-[#7D7168] font-bold mt-1 text-xs lg:text-base">البث المباشر للسحب</p>
        </div>
        <img src="images/logo-contest.png" class="h-12 md:h-16 lg:h-24 w-auto object-contain" alt="شعار المسابقة">
    </header>

    <!-- المنطقة الرئيسية (تصبح سكرول في الجوال، وثابتة في الكمبيوتر) -->
    <!-- flex-col للجوال، lg:flex-row للكمبيوتر -->
    <main class="flex-1 overflow-y-auto lg:overflow-hidden flex flex-col lg:flex-row p-4 lg:p-6 gap-4 lg:gap-6 relative w-full custom-scrollbar">
        <canvas id="confettiCanvas" class="fixed inset-0 w-full h-full pointer-events-none z-40"></canvas>

        <!-- منطقة الصندوق (رقم 1 في الجوال، رقم 2 في الكمبيوتر) -->
        <section class="order-1 lg:order-2 flex-none lg:flex-1 min-h-[350px] lg:min-h-0 flex flex-col items-center justify-center relative bg-[#2A3F46]/5 rounded-[30px] lg:rounded-[40px] border-4 border-dashed border-[#7D7168]/20 p-6 lg:p-10 text-center overflow-hidden shrink-0">
            <div id="loadingStatus" class="text-[#7D7168] text-base lg:text-xl font-bold animate-pulse">جاري جلب قائمة المشاركين...</div>

            <!-- الصندوق أصبح بحجم متجاوب max-w -->
            <div id="giftContainer" class="hidden relative group transition-transform duration-500 hover:scale-110">
                <svg viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full max-w-[220px] lg:max-w-[320px] drop-shadow-2xl mx-auto">
                    <rect x="40" y="80" width="160" height="130" rx="8" fill="#7D7168" />
                    <rect x="30" y="60" width="180" height="40" rx="4" fill="#8C847D" />
                    <rect x="110" y="60" width="20" height="150" fill="#F3EFE9" />
                    <path d="M120 60C120 60 160 20 180 40C200 60 140 60 120 60Z" fill="#F3EFE9" stroke="#8C847D" stroke-width="2"/>
                    <path d="M120 60C120 60 80 20 60 40C40 60 100 60 120 60Z" fill="#F3EFE9" stroke="#8C847D" stroke-width="2"/>
                    <circle cx="120" cy="60" r="12" fill="#F3EFE9" stroke="#8C847D" stroke-width="2"/>
                    <ellipse cx="120" cy="225" rx="90" ry="12" fill="black" fill-opacity="0.1" />
                </svg>
                <div id="shakeMessage" class="absolute -top-10 lg:-top-16 left-1/2 -translate-x-1/2 bg-[#C5B358] text-white px-6 lg:px-10 py-2 lg:py-3 rounded-full font-black shadow-2xl hidden whitespace-nowrap text-sm lg:text-base">🎁 جاري اختيار الفائز...</div>
                <div class="absolute -bottom-8 lg:-bottom-10 left-1/2 -translate-x-1/2 text-[#7D7168] font-bold text-sm lg:text-lg opacity-80 whitespace-nowrap">بانتظار إشارة السحب من الإدارة</div>
            </div>

            <!-- بطاقة الفائز -->
            <div id="winnerCard" class="hidden scale-in flex flex-col items-center z-50 w-full">
                <div class="bg-white p-8 lg:p-16 rounded-[40px] lg:rounded-[60px] shadow-2xl border-b-[8px] lg:border-b-[12px] border-[#C5B358] text-center max-w-lg w-full">
                    <div class="bg-[#C5B358]/10 w-16 h-16 lg:w-24 lg:h-24 rounded-full flex items-center justify-center mx-auto mb-4 lg:mb-8 text-[#C5B358]">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 lg:w-12 lg:h-12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
                    </div>
                    <span class="text-xs lg:text-sm font-black text-[#8C847D] tracking-[0.2em] lg:tracking-[0.4em] uppercase mb-2 lg:mb-4 block">المشارك الفائز</span>
                    <h2 id="winnerName" class="text-2xl md:text-4xl lg:text-5xl font-black text-[#2A3F46] mb-6 lg:mb-8 leading-tight">...</h2>
                    <div class="bg-[#F3EFE9] py-3 px-6 lg:py-5 lg:px-8 rounded-2xl lg:rounded-[25px]">
                        <span id="winnerPrize" class="text-lg md:text-2xl lg:text-3xl font-bold text-[#7D7168]">...</span>
                    </div>
                </div>
                <button onclick="resetView()" class="mt-6 lg:mt-10 bg-[#2A3F46] text-white px-8 py-3 lg:px-10 lg:py-4 rounded-full font-bold hover:bg-[#1e2e33] transition-all flex items-center gap-3 shadow-xl text-sm lg:text-lg">
                    <span>🔄 العودة للصندوق</span>
                </button>
            </div>

            <button id="replayBtn" onclick="startReplay()" class="absolute bottom-6 lg:bottom-10 left-1/2 -translate-x-1/2 hidden flex items-center gap-3 bg-white px-6 py-3 lg:px-10 lg:py-4 rounded-full shadow-2xl border-2 border-[#C5B358] text-[#2A3F46] font-black hover:scale-105 transition-all text-sm lg:text-lg z-50 whitespace-nowrap">
                <span>▶️ إعادة عرض السحب</span>
            </button>
        </section>

        <!-- سجل الفائزين (رقم 2 في الجوال، رقم 3 في الكمبيوتر) -->
        <aside class="order-2 lg:order-3 flex flex-col w-full lg:w-80 h-[250px] lg:h-full bg-white rounded-[30px] lg:rounded-[40px] shadow-2xl border border-[#C5B358]/30 overflow-hidden shrink-0">
            <div class="flex-none bg-[#C5B358] p-4 lg:p-6 text-[#2A3F46] text-center">
                <h3 class="font-bold text-lg lg:text-xl flex items-center justify-center gap-3">
                    <span>🏆 سجل الفائزين</span>
                    <span id="winnersCount" class="bg-[#2A3F46] text-white px-3 py-0.5 rounded-full text-xs lg:text-sm font-black">0</span>
                </h3>
            </div>
            <div id="winnersList" class="flex-1 min-h-0 overflow-y-auto custom-scrollbar p-4 lg:p-5 space-y-3 lg:space-y-4"></div>
        </aside>

        <!-- قائمة المشاركين (رقم 3 في الجوال، رقم 1 في الكمبيوتر) -->
        <aside class="order-3 lg:order-1 flex flex-col w-full lg:w-80 h-[250px] lg:h-full bg-white rounded-[30px] lg:rounded-[40px] shadow-2xl border border-[#7D7168]/10 overflow-hidden shrink-0">
            <div class="flex-none bg-[#2A3F46] p-4 lg:p-6 text-white text-center">
                <h3 class="font-bold text-lg lg:text-xl flex items-center justify-center gap-3">
                    <span>👤 المتأهلون</span>
                    <span id="participantsCount" class="bg-[#C5B358] text-[#2A3F46] px-3 py-0.5 rounded-full text-xs lg:text-sm font-black">0</span>
                </h3>
            </div>
            <div class="flex-1 min-h-0 overflow-y-auto custom-scrollbar">
                <table class="w-full">
                    <tbody id="participantsList"></tbody>
                </table>
            </div>
        </aside>

    </main>

    <!-- الفوتر (يلتف في الجوال flex-wrap) -->
    <footer class="flex-none bg-white border-t border-[#7D7168]/15 px-6 lg:px-12 py-4 lg:py-5 flex flex-wrap justify-center items-center gap-6 lg:gap-16 shadow-inner z-50">
        <div class="flex items-center gap-3 lg:gap-5 border-l-2 lg:border-l-4 border-[#F3EFE9] pl-6 lg:pl-12 w-full md:w-auto text-center justify-center">
            <span class="text-xs lg:text-sm font-black text-[#8C847D] uppercase tracking-[0.2em]">شركاء النجاح</span>
        </div>
        <img src="images/sponsor1.png" class="sponsor-img h-10 lg:h-16 w-auto object-contain" alt="الراعي الأول">
        <img src="images/sponsor2.png" class="sponsor-img h-10 lg:h-16 w-auto object-contain" alt="الراعي الثاني">
    </footer>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwre04ZZL5lD77EYg1g0vKlzFKmmn0FvmpneXmBd98Wsys0E6K4386WOEqFqI9XQG8h/exec";
        const bc = new BroadcastChannel('sunnan_channel');
        
        let participants = [];
        let winners = [];
        let fetchedWinners = [];
        let initialParticipants = [];
        let isReplaying = false;

        const canvas = document.getElementById('confettiCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        async function fetchData() {
            try {
                const [qRes, wRes] = await Promise.all([
                    fetch(`${SCRIPT_URL}?action=getQualified`).then(r => r.json()),
                    fetch(`${SCRIPT_URL}?action=getWinnersList`).then(r => r.json()).catch(() => [])
                ]);
                participants = qRes || [];
                winners = wRes || [];
            } catch (e) {
                console.error("خطأ في الاتصال بالسيرفر:", e);
            } finally {
                // وضعنا التحديث هنا لكي يظهر الصندوق وتختفي رسالة التحميل دائماً
                // حتى لو لم يكن هناك مشاركين في قوقل شيت (حل مشكلة التعليق الموضحة في صورتك)
                updateUI();
                document.getElementById('loadingStatus').classList.add('hidden');
                document.getElementById('giftContainer').classList.remove('hidden');
                document.getElementById('giftContainer').classList.add('block'); // ضمان الظهور
                if (winners.length > 0) document.getElementById('replayBtn').classList.remove('hidden');
            }
        }

        function updateUI() {
            const pList = document.getElementById('participantsList');
            pList.innerHTML = participants.map((p, i) => `
                <tr class="border-b border-[#F3EFE9] hover:bg-[#F3EFE9]/80 transition-colors">
                    <td class="p-3 lg:p-4 text-[10px] lg:text-[12px] text-[#8C847D] w-10 lg:w-12 text-center font-bold">${i + 1}</td>
                    <td class="p-3 lg:p-4 font-bold text-sm lg:text-base text-[#2A3F46] text-center">${p}</td>
                </tr>
            `).join('');
            document.getElementById('participantsCount').innerText = participants.length;

            const wList = document.getElementById('winnersList');
            wList.innerHTML = winners.slice().reverse().map(w => `
                <div class="bg-[#F3EFE9] p-3 lg:p-4 rounded-xl lg:rounded-2xl border-r-[6px] lg:border-r-8 border-[#C5B358] shadow-sm fade-in">
                    <div class="font-black text-sm lg:text-base text-[#2A3F46]">${w.name}</div>
                    <div class="text-[10px] lg:text-xs font-bold text-[#7D7168] mt-1 lg:mt-2">${w.prize}</div>
                </div>
            `).join('');
            document.getElementById('winnersCount').innerText = winners.length;
        }

        function createParticles() {
            const colors = ['#C5B358', '#2A3F46', '#7D7168', '#FFFFFF', '#FFD700'];
            for (let i = 0; i < 200; i++) {
                particles.push({
                    x: canvas.width / 2, y: canvas.height / 2,
                    vx: (Math.random() - 0.5) * 35, vy: (Math.random() - 0.5) * 35 - 15,
                    size: Math.random() * 8 + 3,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    life: 1, decay: Math.random() * 0.01 + 0.005
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.4; p.life -= p.decay;
                if (p.life > 0) {
                    ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size);
                } else { particles.splice(i, 1); }
            });
            requestAnimationFrame(animate);
        }
        animate();

        async function fetchData() {
            try {
                const [qRes, wRes] = await Promise.all([
                    fetch(`${SCRIPT_URL}?action=getQualified`).then(r => r.json()),
                    fetch(`${SCRIPT_URL}?action=getWinnersList`).then(r => r.json()).catch(() => [])
                ]);
                
                let qList = qRes || [];
                fetchedWinners = wRes || [];
                
                // بناء قائمة المتأهلين الأصلية لضمان عدم وجود تكرار
                let combined = [...qList];
                fetchedWinners.forEach(w => {
                    if(!combined.includes(w.name)) combined.push(w.name);
                });
                initialParticipants = combined;

                if (fetchedWinners.length > 0) {
                    // إذا كان هناك فائزين سابقين، نخفيهم ونجهز زر الإعادة
                    participants = [...initialParticipants];
                    winners = [];
                    
                    const btn = document.getElementById('replayBtn');
                    btn.innerHTML = "<span>▶️ لإعادة عرض السحب</span>";
                    btn.classList.remove('hidden');
                    
                    const hintMsg = document.getElementById('giftContainer').lastElementChild;
                    if(hintMsg) hintMsg.innerText = "السحب انتهى، اضغط على زر إعادة العرض للبدء";
                } else {
                    participants = [...initialParticipants];
                    winners = [];
                }
            } catch (e) {
                console.error("خطأ في الاتصال بالسيرفر:", e);
            } finally {
                updateUI();
                document.getElementById('loadingStatus').classList.add('hidden');
                document.getElementById('giftContainer').classList.remove('hidden');
                document.getElementById('giftContainer').classList.add('block');
            }
        }

        async function performExplosion(winnerData) {
            const gift = document.getElementById('giftContainer'), msg = document.getElementById('shakeMessage'), btn = document.getElementById('replayBtn');
            btn.classList.add('hidden'); gift.classList.add('animate-shake'); msg.classList.remove('hidden');
            await new Promise(r => setTimeout(r, 2000));
            gift.classList.remove('animate-shake'); gift.classList.add('hidden'); gift.classList.remove('block'); msg.classList.add('hidden');
            document.getElementById('winnerName').innerText = winnerData.name;
            document.getElementById('winnerPrize').innerText = winnerData.prize;
            document.getElementById('winnerCard').classList.remove('hidden');
            createParticles();
            
            // تحديث القوائم دائماً (سواء سحب مباشر أو محاكاة إعادة عرض)
            winners.push(winnerData);
            participants = participants.filter(p => p !== winnerData.name);
            updateUI();
            
            if (!isReplaying && winners.length > 0) {
                btn.innerHTML = "<span>▶️ لإعادة عرض السحب</span>";
                btn.classList.remove('hidden');
            }
        }

        function resetView() {
            document.getElementById('winnerCard').classList.add('hidden');
            document.getElementById('giftContainer').classList.remove('hidden');
            document.getElementById('giftContainer').classList.add('block');
            if (winners.length > 0 && !isReplaying) document.getElementById('replayBtn').classList.remove('hidden');
        }

        bc.onmessage = (e) => {
            if (e.data.type === 'SPIN') {
                fetchedWinners.push({ name: e.data.winner, prize: e.data.prize });
                performExplosion({ name: e.data.winner, prize: e.data.prize });
            }
            if (e.data.type === 'INIT') { 
                participants = e.data.qualified; 
                initialParticipants = [...participants];
                updateUI(); 
            }
        };

        async function startReplay() {
            if (fetchedWinners.length === 0 || isReplaying) return;
            isReplaying = true;
            
            // تصفير القوائم استعداداً لمحاكاة السحب
            winners = [];
            participants = [...initialParticipants];
            updateUI();
            
            document.getElementById('replayBtn').classList.add('hidden');
            
            for (const w of fetchedWinners) {
                await performExplosion(w);
                await new Promise(r => setTimeout(r, 4000));
                resetView();
            }
            
            isReplaying = false;
            const btn = document.getElementById('replayBtn');
            btn.innerHTML = "<span>▶️ إعادة عرض السحب</span>";
            btn.classList.remove('hidden');
        }

        window.onload = fetchData;
    </script>
</body>
</html>
